<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEUCRUD - Consulta IBGE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #1f1f29;
      background: #f4f1fb;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 40px;
      color: #5b1aa6;
    }

    p {
      line-height: 1.5;
    }

    .consulta {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid #d8caed;
      border-radius: 8px;
      background: #ffffff;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 120px;
      padding: 12px;
      border: 1px solid #bfa9dc;
      border-radius: 6px;
      font-size: 16px;
      text-transform: uppercase;
    }

    button {
      margin-left: 8px;
      padding: 12px 16px;
      border: 0;
      border-radius: 6px;
      color: #ffffff;
      background: #5b1aa6;
      font-weight: 700;
      cursor: pointer;
    }

    ul {
      columns: 2;
      margin-top: 20px;
      padding-left: 20px;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 32px;
      }

      ul {
        columns: 1;
      }

      button {
        display: block;
        margin: 12px 0 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>CEUCRUD</h1>
    <p>Consulta publica de municipios por UF usando a API de Localidades do IBGE.</p>

    <section class="consulta">
      <label for="uf">UF</label>
      <input id="uf" maxlength="2" value="SP" aria-label="UF">
      <button id="buscar">Buscar municipios</button>
      <p id="status"></p>
      <ul id="resultado"></ul>
    </section>
  </main>

  <script>
    const ufInput = document.querySelector("#uf");
    const buscarButton = document.querySelector("#buscar");
    const statusText = document.querySelector("#status");
    const resultado = document.querySelector("#resultado");

    async function buscarMunicipios() {
      const uf = ufInput.value.trim().toUpperCase();
      resultado.innerHTML = "";

      if (!/^[A-Z]{2}$/.test(uf)) {
        statusText.textContent = "Informe uma UF valida com 2 letras.";
        return;
      }

      statusText.textContent = "Consultando API do IBGE...";

      try {
        const resposta = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
        if (!resposta.ok) {
          throw new Error("Falha na consulta");
        }

        const municipios = await resposta.json();
        statusText.textContent = `${municipios.length} municipios encontrados para ${uf}.`;
        resultado.innerHTML = municipios
          .map((municipio) => `<li>${municipio.nome}</li>`)
          .join("");
      } catch (error) {
        statusText.textContent = "Nao foi possivel consultar a API do IBGE.";
      }
    }

    buscarButton.addEventListener("click", buscarMunicipios);
    buscarMunicipios();
  </script>
</body>
</html>
